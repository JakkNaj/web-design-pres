name: Deploy client previews to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            golmansketreninky/package-lock.json
            hcricany/package-lock.json
            ceskadopravnistavba/package-lock.json
      - name: Build Gólmanské tréninky
        working-directory: golmansketreninky
        env:
          ASTRO_BASE: /web-design-pres/golmansketreninky
        run: |
          npm ci
          npm run build
          node ../scripts/prepare-pages.mjs dist /web-design-pres/golmansketreninky
      - name: Build HC Říčany
        working-directory: hcricany
        env:
          ASTRO_BASE: /web-design-pres/hcricany
        run: |
          npm ci
          npm run build
          node ../scripts/prepare-pages.mjs dist /web-design-pres/hcricany
      - name: Build Česká dopravní stavba
        working-directory: ceskadopravnistavba
        env:
          ASTRO_BASE: /web-design-pres/ceskadopravnistavba
        run: |
          npm ci
          npm run build
          node ../scripts/prepare-pages.mjs dist /web-design-pres/ceskadopravnistavba
      - name: Assemble Pages artifact
        run: |
          mkdir -p _site/golmansketreninky _site/hcricany _site/ceskadopravnistavba
          cp index.html _site/index.html
          cp -R golmansketreninky/dist/. _site/golmansketreninky/
          cp -R hcricany/dist/. _site/hcricany/
          cp -R ceskadopravnistavba/dist/. _site/ceskadopravnistavba/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
