local_backend: true
backend:
  name: test-repo
  login: false
  branch: main
media_folder: "uploads"
public_folder: "/uploads"
locale: "cs"
collections:
  - name: "news"
    label: "Aktuality"
    label_singular: "Aktualita"
    folder: "aktuality"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Titulek", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Perex", name: "excerpt", widget: "text" }
      - { label: "Obrázek", name: "image", widget: "image", required: false }
      - { label: "Kategorie", name: "category", widget: "string" }
      - { label: "Publikováno", name: "published", widget: "boolean", default: false }
      - { label: "Obsah", name: "body", widget: "markdown" }
  - name: "gallery"
    label: "Fotogalerie"
    label_singular: "Album"
    folder: "fotogalerie"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Název alba", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }
      - { label: "Úvodní fotka", name: "coverImage", widget: "image", required: false }
      - { label: "Popis", name: "description", widget: "text", required: false }
      - label: "Fotky"
        name: "photos"
        widget: "list"
        summary: "{{fields.caption}}"
        fields:
          - { label: "Fotka", name: "image", widget: "image" }
          - { label: "Popisek", name: "caption", widget: "string", required: false }
